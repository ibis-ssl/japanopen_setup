x-host-service: &host_service
  network_mode: host

services:
  admin-ui:
    <<: *host_service
    build:
      context: .
      dockerfile: docker/admin-ui/Dockerfile
    working_dir: /workspace
    command:
      - python
      - -m
      - uvicorn
      - admin_server.app:app
      - --host
      - 127.0.0.1
      - --port
      - "8080"
      - --reload
      - --reload-dir
      - /workspace/admin_server
    environment:
      PYTHONUNBUFFERED: "1"
      WORKSPACE_DIR: /workspace
      HOST_PROC_ASOUND: /host/proc/asound
    volumes:
      - .:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc/asound:/host/proc/asound:ro

  ssl-game-controller:
    <<: *host_service
    image: robocupssl/ssl-game-controller:3.20.3
    command:
      - -visionAddress
      - 224.5.23.2:10006
      - -trackerAddress
      - 224.5.23.2:10010
      - -publishAddress
      - 224.5.23.1:10003
      - -address
      - :8081
    volumes:
      - ./config:/config:ro
      - ./data/gc:/data:rw

  ssl-vision-client:
    <<: *host_service
    image: robocupssl/ssl-vision-client:2.1.0
    command:
      - -address
      - :8082
    volumes:
      - ./config/ssl-vision-client.json:/config.json:ro

  ssl-status-board:
    <<: *host_service
    image: robocupssl/ssl-status-board:2.18.0
    command:
      - -address
      - :8083
      - -refereeAddress
      - 224.5.23.1:10003

  ssl-remote-control-yellow:
    <<: *host_service
    image: robocupssl/ssl-remote-control:1.4.3
    command:
      - -address
      - :8084
      - -refereeAddress
      - 224.5.23.1:10003
      - -team
      - YELLOW

  ssl-remote-control-blue:
    <<: *host_service
    image: robocupssl/ssl-remote-control:1.4.3
    command:
      - -address
      - :8085
      - -refereeAddress
      - 224.5.23.1:10003
      - -team
      - BLUE

  autoref-tigers:
    <<: *host_service
    image: tigersmannheim/auto-referee:1.7.1-12-g39cac863
    command:
      - -a
      - -hl
      - --visionAddress
      - 224.5.23.2:10006
      - --refereeAddress
      - 224.5.23.1:10003
      - --trackerAddress
      - 224.5.23.2:10010

  autoref-erforce:
    <<: *host_service
    image: roboticserlangen/autoref:2025.1.0
    command:
      - --vision-port
      - "10006"
      - --tracker-port
      - "10010"
      - --gc-port
      - "10003"

  ssl-auto-recorder:
    <<: *host_service
    image: robocupssl/ssl-auto-recorder:1.11.0
    stop_signal: SIGINT
    stop_grace_period: 30s
    working_dir: /logs
    command:
      - -output-folder
      - /logs
      - -referee-address
      - 224.5.23.1:10003
      - -vision-address
      - 224.5.23.2:10006
      - -vision-tracker-address
      - 224.5.23.2:10010
      - -vision-legacy-enabled=false
      - -http-serve=false
    volumes:
      - ./data/logs/auto-recorder:/logs:rw

  ssl-playback:
    <<: *host_service
    build:
      context: .
      dockerfile: docker/ssl-playback/Dockerfile
      args:
        SSL_GC_PROTO_REF: v3.20.3
    environment:
      VISION_ADDRESS: 224.5.23.2
      VISION_PORT: "10006"
      TRACKER_ADDRESS: 224.5.23.2
      TRACKER_PORT: "10010"
      REFEREE_ADDRESS: 224.5.23.1
      REFEREE_PORT: "10003"
      PLAYBACK_UI_PORT: "8086"
      PLAYBACK_BUFFER_SECONDS: "60"
    volumes:
      - ./ssl_playback:/app/ssl_playback:ro

  audioref:
    <<: *host_service
    stop_signal: SIGINT
    build:
      context: .
      dockerfile: docker/audioref/Dockerfile
      args:
        AUDIOREF_REF: 27e893fc8f06801c91a49f6a03e0b6ceafd6a07f
    image: japanopen-ssl/audioref:27e893fc8f06801c91a49f6a03e0b6ceafd6a07f
    devices:
      - /dev/snd:/dev/snd
    environment:
      REFEREE_ADDRESS: 224.5.23.1
      REFEREE_PORT: "10003"
      VISION_ADDRESS: 224.5.23.2
      VISION_PORT: "10006"
      AUDIOREF_PACK_DIR: /opt/audioref/sounds/en
      AUDIOREF_OUTPUT_PCM: default
      AUDIOREF_MAX_QUEUE_LEN: "3"
      AUDIOREF_ANTI_STANDBY_SOUND: "false"
