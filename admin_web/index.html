<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japan Open Control Deck</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero__eyebrow">Japan Open SSL Operations</div>
      <div class="hero__main">
        <div>
          <h1>Control Deck</h1>
          <p class="hero__copy">
            運営用の主要 UI を 1 画面に集約し、サービス状態確認と AudioRef の出力先切替をまとめて扱います。
          </p>
        </div>
        <div class="hero__status">
          <div class="metric">
            <span class="metric__label">Running</span>
            <strong id="metric-running">0</strong>
          </div>
          <div class="metric">
            <span class="metric__label">Services</span>
            <strong id="metric-total">0</strong>
          </div>
        </div>
      </div>
      <div class="hero__notice" id="service-error" hidden></div>
    </header>

    <div class="workspace">
      <nav class="tab-rail" id="tab-rail" aria-label="Admin tabs"></nav>
      <main class="panel-stack" id="panel-stack"></main>
    </div>
  </div>

  <template id="tab-button-template">
    <button class="tab-button" type="button"></button>
  </template>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
