<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japan Open Control Deck</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar__left">
        <span class="topbar__app">Japan Open Control Deck</span>
        <span class="topbar__sep" aria-hidden="true">/</span>
        <h1 class="topbar__panel-title" id="topbar-panel-title"></h1>
      </div>
      <div class="topbar__right">
        <div class="pill-row" id="topbar-actions"></div>
        <div class="topbar__metrics">
          <div class="metric-chip">
            <span>Running</span>
            <strong id="metric-running">0</strong>
          </div>
          <div class="metric-chip">
            <span>Total</span>
            <strong id="metric-total">0</strong>
          </div>
        </div>
      </div>
    </header>
    <div class="service-error" id="service-error" hidden></div>

    <div class="workspace">
      <nav class="tab-rail" id="tab-rail" aria-label="Admin tabs"></nav>
      <main class="panel-stack" id="panel-stack"></main>
    </div>
  </div>

  <template id="tab-button-template">
    <button class="tab-button" type="button"></button>
  </template>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
